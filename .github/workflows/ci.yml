name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate GitHub Actions
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://api.github.com/repos/rhysd/actionlint/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          curl -fsSL -o /tmp/actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/${version}/actionlint_${version#v}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -color

      - name: Install shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Check shell formatting
        run: shfmt -d init.sh scripts/*.sh

      - name: Lint shell scripts
        run: shellcheck init.sh scripts/*.sh

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 "**/*.md"

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lfcru
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lfcru"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Create test database
        run: psql -h localhost -U postgres -c "CREATE DATABASE lfcru_test;"
        env:
          PGPASSWORD: postgres

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags integration -p 1 ./internal/...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lfcru_test?sslmode=disable

  test-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Create .env for docker compose
        run: cp .env.example .env

      - name: Start postgres
        run: docker compose -f docker-compose.dev.yml -p lfcru_forum up -d postgres

      - name: Wait for postgres
        run: |
          for _ in $(seq 1 20); do
            docker exec lfcru_forum-postgres-1 pg_isready -U postgres -d lfcru && break
            sleep 2
          done

      - name: Start app-e2e
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for app-e2e
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8081/ && break
            sleep 2
          done

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            e2e/test-report/
          retention-days: 7
