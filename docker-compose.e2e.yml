services:
  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/lfcru_test?sslmode=disable"
      APP_PORT: "8080"
      COOKIE_SECURE: "false"
      BCRYPT_COST: "4"
      UPLOADS_DIR: "/app/storage/news"
    env_file:
      - .env
    volumes:
      - storage_data_e2e:/app/storage/news
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lfcru_forum_default

networks:
  lfcru_forum_default:
    external: true

volumes:
  storage_data_e2e:
