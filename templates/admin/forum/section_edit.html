{{define "templates/admin/forum/section_edit.html"}}
{{template "templates/admin/layouts/layout.html" .}}
{{end}}

{{define "admin-content"}}
{{if .Section}}
<h1 class="admin-header">Редактировать раздел</h1>
{{else}}
<h1 class="admin-header">Создать раздел</h1>
{{end}}
{{if .Error}}<p style="color:#c8102e;margin-bottom:1rem;">{{.Error}}</p>{{end}}
<form method="POST" action="{{if .Section}}/admin/forum/sections/{{.Section.ID}}{{else}}/admin/forum/sections{{end}}" style="max-width:600px;">
  <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
  <div style="margin-bottom:1rem;">
    <label for="title" style="display:block;margin-bottom:0.25rem;font-weight:600;">Название <span style="color:#c8102e;">*</span></label>
    <input type="text" id="title" name="title" value="{{if .Section}}{{.Section.Title}}{{end}}" required maxlength="255"
           style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
  </div>
  <div style="margin-bottom:1.5rem;">
    <label for="description" style="display:block;margin-bottom:0.25rem;font-weight:600;">Описание</label>
    <textarea id="description" name="description" rows="4" maxlength="2000"
              style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;resize:vertical;">{{if .Section}}{{.Section.Description}}{{end}}</textarea>
  </div>
  <button type="submit" style="padding:0.5rem 1.5rem;background:#c8102e;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:1rem;">
    {{if .Section}}Сохранить{{else}}Создать{{end}}
  </button>
  <a href="/admin/forum/sections" style="margin-left:1rem;color:#555;">Отмена</a>
</form>
{{end}}
