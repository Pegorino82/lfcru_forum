{{define "templates/auth/login.html"}}
{{template "templates/layouts/base.html" .}}
{{end}}

{{define "content"}}
<div id="login-wrapper" style="max-width:480px;margin:0 auto">
    <h1 style="margin-bottom:1.5rem">Вход</h1>

    {{if .Error}}
    <div class="flash error" style="margin-bottom:1rem">{{.Error}}</div>
    {{end}}

    <form id="login-form"
          method="POST"
          action="/login"
          hx-post="/login"
          hx-target="#login-wrapper"
          hx-swap="outerHTML">

        <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

        <div style="margin-bottom:1rem">
            <label for="email">Email</label><br>
            <input
                id="email"
                name="email"
                type="email"
                value="{{.Email}}"
                autocomplete="email"
                autofocus
                style="width:100%;padding:0.5rem;margin-top:0.25rem;border:1px solid #ccc;border-radius:4px">
        </div>

        <div style="margin-bottom:1.5rem">
            <label for="password">Пароль</label><br>
            <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                style="width:100%;padding:0.5rem;margin-top:0.25rem;border:1px solid #ccc;border-radius:4px">
        </div>

        <button type="submit" style="background:#c8102e;color:#fff;border:none;padding:0.6rem 1.5rem;border-radius:4px;cursor:pointer;font-size:1rem">
            Войти
        </button>

        <p style="margin-top:1rem">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    </form>
</div>
{{end}}
